services:
  - type: web
    name: equilibrium-ai
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb://user:password@host:port/database"
      - key: GROQ_API_KEY
        sync: false
        placeholder: "Enter your Groq API Key (gsk_...)"
      - key: TAVILY_API_KEY
        sync: false
        placeholder: "Enter your Tavily API Key (tvly-...)"
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
        placeholder: "Enter your Alpha Vantage API Key (Optional)"
